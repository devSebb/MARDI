name: MARDI
options:
  bundleIdPrefix: com.mardi
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  SQLiteVec:
    url: https://github.com/jkrukowski/SQLiteVec.git
    from: "0.0.7"
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "5.1.3"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: "4.2.2"

targets:
  MARDI:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: MARDI
        excludes:
          - "Info.plist"
          - "MARDI.entitlements"
    resources:
      - path: MARDI/Resources
        optional: true
    dependencies:
      - package: SQLiteVec
      - package: Yams
      - package: KeychainAccess
    info:
      path: MARDI/Info.plist
      properties:
        CFBundleDisplayName: MARDI
        CFBundleName: MARDI
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        LSUIElement: false
        NSHighResolutionCapable: true
        NSAppleEventsUsageDescription: "MARDI needs this to read the URL of your current browser tab when you save it."
        NSScreenCaptureUsageDescription: "MARDI captures the region you draw in Select Mode to extract text from it."
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mardi.app
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: MARDI/MARDI.entitlements
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        DEVELOPMENT_TEAM: ""
